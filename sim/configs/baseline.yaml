# Baseline Configuration - No Domain Randomization
# Trains a policy without any randomization for comparison

task: reach
randomization: none
algorithm: sac
steps: 5000000
num_envs: 4
seed: 42

# SAC hyperparameters
learning_rate: 0.0003
buffer_size: 1000000
batch_size: 256
gamma: 0.99
tau: 0.005
train_freq: 1
gradient_steps: 1

# Evaluation
eval_freq: 250000
n_eval_episodes: 20
deterministic_eval: true

# Logging
use_wandb: true
project_name: sim-to-real-arm
run_name: baseline-reach
